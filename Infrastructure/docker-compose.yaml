version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: wind_turbine_db
    environment:
      POSTGRES_USER: scada_admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: turbine_telemetry
    ports:
      - "5432:5432"
    volumes:
      - turbine_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: turbine_dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - timescaledb

volumes:
  turbine_data:
